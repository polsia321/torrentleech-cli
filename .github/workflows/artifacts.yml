name: release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: tl
            archive: tl-linux-x86_64.tar.gz
          - name: linux-aarch64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary: tl
            archive: tl-linux-aarch64.tar.gz
            linker: aarch64-linux-gnu-gcc
            linker_package: gcc-aarch64-linux-gnu
          - name: macos-aarch64
            os: macos-14
            target: aarch64-apple-darwin
            binary: tl
            archive: tl-macos-aarch64.tar.gz
          - name: windows-x86_64
            os: windows-2025-vs2026
            target: x86_64-pc-windows-msvc
            binary: tl.exe
            archive: tl-windows-x86_64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install linker
        if: matrix.linker_package != ''
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends "${{ matrix.linker_package }}"

      - name: Build
        shell: bash
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.linker }}
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package Unix artifact
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" dist/
          tar -C dist -czf "${{ matrix.archive }}" "${{ matrix.binary }}"

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" dist/
          Compress-Archive -Path "dist/${{ matrix.binary }}" -DestinationPath "${{ matrix.archive }}" -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.archive }}
          if-no-files-found: error

  release:
    name: publish commit release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Flatten artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          find artifacts -type f -maxdepth 2 -exec cp {} release/ \;
          ls -la release

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          {
            echo "Automated build for commit ${{ github.sha }}."
            echo
            echo "## Recent commits"
            git log --oneline --no-decorate -10 --format='- `%h` %s'
          } > release-notes.md

          gh release delete "commit-${{ github.sha }}" --cleanup-tag --yes || true
          gh release create "commit-${{ github.sha }}" release/* \
            --title "${{ github.sha }}" \
            --notes-file release-notes.md \
            --target "${{ github.sha }}" \
            --latest

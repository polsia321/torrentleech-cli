name: nix

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: nix build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: Check flake
        run: nix flake check --print-build-logs

      - name: Build package
        run: nix build --print-build-logs

      - name: Check binary
        run: ./result/bin/tl --version
